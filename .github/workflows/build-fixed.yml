name: Build fixed StepPhantom APK

on:
  push:
    branches: [ build-fixed ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4

      - name: Extract corrected project
        run: |
          rm -rf extracted
          mkdir -p extracted
          unzip -q StepPhantom_fixed.zip -d extracted
          test -f extracted/StepPhantom/settings.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        working-directory: extracted/StepPhantom
        run: gradle clean assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StepPhantom-fixed-debug-apk
          path: extracted/StepPhantom/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: StepPhantom-fixed-build-reports
          path: |
            extracted/StepPhantom/**/build/reports/**
            extracted/StepPhantom/**/build/outputs/logs/**
          if-no-files-found: ignore
