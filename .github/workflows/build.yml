name: Build StepPhantom APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 16 SDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StepPhantom-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload full build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: StepPhantom-full-build-log
          path: build.log
          if-no-files-found: error

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: StepPhantom-build-reports
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
